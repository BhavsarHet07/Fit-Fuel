<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Plans — FitFuel</title>
  <meta name="description" content="Science-backed workout programs for beginners, intermediate and advanced athletes.">
  <link rel="stylesheet" href="style.css">
  <style>
    .workout-page { padding-bottom: 80px; }

    /* Level selector */
    .level-selector { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
    .level-btn {
      flex: 1; max-width: 280px; padding: 18px 22px;
      border-radius: var(--r); border: 2px solid var(--border);
      background: #fff; text-align: left; cursor: pointer;
      transition: var(--t); position: relative; overflow: hidden;
    }
    .level-btn::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      opacity: 0; transition: opacity .2s;
    }
    .level-btn.active::after { opacity: 1; }
    .level-btn[data-level="beginner"].active     { border-color: #22c55e; }
    .level-btn[data-level="beginner"].active::after { background: #22c55e; }
    .level-btn[data-level="intermediate"].active { border-color: #3b82f6; }
    .level-btn[data-level="intermediate"].active::after { background: #3b82f6; }
    .level-btn[data-level="advanced"].active     { border-color: #ef4444; }
    .level-btn[data-level="advanced"].active::after { background: #ef4444; }
    .level-btn:hover:not(.active) { border-color: rgba(249,115,22,.4); }
    .level-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .level-name { font-weight: 800; font-size: 1rem; }
    .level-badge { font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 50px; }
    .bg-beg { background: #dcfce7; color: #166534; }
    .bg-int { background: #dbeafe; color: #1e40af; }
    .bg-adv { background: #fee2e2; color: #991b1b; }
    .level-sub { font-size: .82rem; color: var(--muted); }

    /* Program banner */
    .prog-banner {
      background: var(--fg); color: #fff;
      border-radius: var(--r-xl); padding: 36px 40px;
      display: flex; gap: 48px; justify-content: space-between;
      align-items: flex-start; flex-wrap: wrap;
      margin-bottom: 20px;
      box-shadow: var(--shadow-lg);
    }
    .prog-subtitle { font-size: .8rem; color: rgba(255,255,255,.5); margin-bottom: 6px; }
    .prog-title    { font-size: 1.7rem; font-weight: 900; margin-bottom: 12px; }
    .prog-overview { font-size: .875rem; color: rgba(255,255,255,.65); max-width: 500px; line-height: 1.75; }
    .prog-meta     { display: flex; gap: 32px; flex-wrap: wrap; align-self: center; flex-shrink: 0; }
    .prog-meta-item { display: flex; align-items: center; gap: 10px; }
    .prog-meta-icon { font-size: 1.25rem; }
    .prog-meta-item small  { display: block; font-size: .72rem; color: rgba(255,255,255,.45); margin-bottom: 1px; }
    .prog-meta-item strong { font-size: .9rem; }

    /* Day cards */
    .workout-days { display: flex; flex-direction: column; gap: 10px; }
    .day-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .day-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; cursor: pointer;
      transition: background .18s; user-select: none;
    }
    .day-header:hover { background: var(--bg); }
    .day-left  { display: flex; align-items: center; gap: 16px; }
    .day-icon  {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .day-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .day-name-row strong { font-size: 1rem; font-weight: 800; }
    .day-lbl-badge {
      font-size: .7rem; background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 50px; color: var(--muted);
    }
    .day-focus { font-size: .82rem; color: var(--muted); }
    .day-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .day-ex-count { font-size: .82rem; font-weight: 600; color: var(--muted); }
    .chevron { font-size: .7rem; color: var(--muted); transition: transform .25s; }
    .day-card.open .chevron { transform: rotate(180deg); }
    .day-body {
      max-height: 0; overflow: hidden;
      transition: max-height .35s ease;
      border-top: 0 solid var(--border);
    }
    .day-card.open .day-body { max-height: 3000px; border-top-width: 1px; }

    /* Exercise table */
    .ex-table-head {
      display: flex; gap: 10px;
      padding: 10px 24px;
      background: #f8fafc;
      font-size: .72rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
    }
    .ex-table-head span:first-child { flex: 2; }
    .ex-table-head span             { flex: 1; }
    .ex-row {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 14px 24px;
      border-top: 1px solid #f1f5f9;
      transition: background .15s;
    }
    .ex-row:hover { background: #fafafa; }
    .ex-name-cell { flex: 2; }
    .ex-name-cell strong { display: block; font-size: .9rem; margin-bottom: 4px; }
    .ex-tip { font-size: .75rem; color: var(--muted); }
    .ex-cell { flex: 1; font-size: .875rem; padding-top: 2px; }
    .ex-cell strong { font-size: 1.2rem; font-weight: 900; }
    .ex-muted { color: var(--muted); }

    /* Mobile row */
    .ex-row-mob { display: none; padding: 12px 20px; border-top: 1px solid #f1f5f9; }
    .ex-mob-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .ex-mob-top strong { font-size: .9rem; }
    .ex-mob-stats { font-size: .8rem; color: var(--muted); margin-bottom: 6px; }

    .warmup-bar {
      padding: 12px 24px;
      background: #fffbeb; border-top: 1px solid #fef3c7;
      font-size: .8rem; color: #92400e;
    }

    @media (max-width: 768px) {
      .ex-row, .ex-table-head { display: none; }
      .ex-row-mob { display: block; }
      .prog-banner { padding: 24px 22px; flex-direction: column; gap: 22px; }
      .level-selector { flex-direction: column; align-items: stretch; }
      .level-btn { max-width: 100%; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-badge">FF</div>FitFuel</a>
    <div class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')"><span></span><span></span><span></span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="calculator.html">Calculator</a>
      <a href="diet.html">Diet</a>
      <a href="workout.html" class="active">Workout</a>
      <a href="store.html">Store</a>
    </div>
    <button class="nav-cart" onclick="location.href='store.html'" title="Cart">🛒<span class="cart-count"></span></button>
  </div>
</nav>

<main class="workout-page">
  <div class="container">
    <div class="page-header fade-up fade-up-1">
      <div class="section-tag">🏋️ Professional Workout Programs</div>
      <h1>Structured Training Plans</h1>
      <p>Science-backed programs for every level. Pick your experience to unlock your personalised routine.</p>
    </div>

    <div class="level-selector fade-up fade-up-2">
      <button class="level-btn active" data-level="beginner">
        <div class="level-top">
          <span class="level-name">Beginner</span>
          <span class="level-badge bg-beg">0–1 year</span>
        </div>
        <span class="level-sub">3-Day Full Body Split</span>
      </button>
      <button class="level-btn" data-level="intermediate">
        <div class="level-top">
          <span class="level-name">Intermediate</span>
          <span class="level-badge bg-int">1–3 years</span>
        </div>
        <span class="level-sub">6-Day PPL Split</span>
      </button>
      <button class="level-btn" data-level="advanced">
        <div class="level-top">
          <span class="level-name">Advanced</span>
          <span class="level-badge bg-adv">3+ years</span>
        </div>
        <span class="level-sub">5-Day Hypertrophy Split</span>
      </button>
    </div>

    <div id="workout-container" class="fade-up fade-up-3"></div>
  </div>
</main>

<footer><strong>FitFuel</strong> &copy; 2024 · All rights reserved.</footer>
<div id="toast"></div>
<script src="script.js"></script>
</body>
</html>
